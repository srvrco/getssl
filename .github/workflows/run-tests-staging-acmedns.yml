name: Run tests against Staging server using acmedns
on:
  push:
    paths-ignore:
      - '.github/workflows/*'
    branches:
      - master
  pull_request:
    paths-ignore:
      - '.github/workflows/*'
    branches:
      - master
  workflow_dispatch:


env:
  DYNU_API_KEY: ${{ secrets.DYNU_API_KEY == '' && '65cXefd35XbYf36546eg5dYcZT6X52Y2' || secrets.DYNU_API_KEY }}

jobs:
  test-ubuntu-acmedns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: test/Dockerfile-ubuntu-acmedns
          tags: getssl-ubuntu-acmedns
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build the docker compose stack
        run: docker compose up -d --build
      - name: Run test suite on Ubuntu against Staging using acmedns
        run: test/run-test.sh ubuntu-acmedns
